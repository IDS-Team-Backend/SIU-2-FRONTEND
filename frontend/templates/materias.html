{% extends "base.html" %}

{% block content %}
<section>
  <h1>Materias</h1>

  <div class="card-grid">
    {% for materia in materias %}
      <a class="card card-link" href="{{ url_for('curso', curso_id=materia.id) }}">
        <span class="card-codigo">{{ materia.codigo }}</span>
        <h2>{{ materia.nombre }}</h2>
      </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
